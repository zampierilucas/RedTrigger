<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#121212"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" rx="16" fill="url(#bg)"/>

  <!-- Red circle (from app icon) -->
  <circle cx="60" cy="60" r="32" fill="#FF1744"/>

  <!-- Trigger icon: center ring -->
  <circle cx="60" cy="60" r="11" fill="none" stroke="#fff" stroke-width="3"/>

  <!-- Trigger icon: left bar (L trigger) -->
  <rect x="38" y="54" width="7" height="12" rx="1.5" fill="#fff"/>

  <!-- Trigger icon: right bar (R trigger) -->
  <rect x="75" y="54" width="7" height="12" rx="1.5" fill="#fff"/>

  <!-- Title -->
  <text x="110" y="55" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">Red</text>
  <text x="170" y="55" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="700" fill="#FF1744" letter-spacing="-0.5">Trigger</text>

  <!-- Subtitle -->
  <text x="110" y="78" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#888888">System-wide shoulder triggers for Red Magic</text>
</svg>
